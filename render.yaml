# Render Blueprint — one free web service that serves the API + built React client.
# Deploy: push to GitHub, then on render.com choose New > Blueprint and pick this repo.
# After the first deploy, set MONGO_URI (Atlas connection string) in the dashboard.
services:
  - type: web
    name: testmart
    runtime: node
    plan: free
    # --include=dev forces devDependencies (nest/vite build tools) to install even
    # though NODE_ENV=production would otherwise skip them (that caused exit 127).
    buildCommand: npm install --include=dev && npm --prefix server install --include=dev && npm --prefix client install --include=dev && npm run build
    startCommand: node server/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # API serves the built client -> single origin, simplest cookies.
      - key: SERVE_CLIENT
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: lax
      # Public instance -> rate limiting ON (protects against abuse / mass registration).
      - key: RATE_LIMIT_ENABLED
        value: "true"
      # NOTE: ENABLE_TEST_RESET is deliberately NOT set — the DB-wipe endpoint stays OFF here.
      # Render generates a strong secret automatically.
      - key: JWT_SECRET
        generateValue: true
      # Set this in the Render dashboard to your MongoDB Atlas connection string.
      - key: MONGO_URI
        sync: false
